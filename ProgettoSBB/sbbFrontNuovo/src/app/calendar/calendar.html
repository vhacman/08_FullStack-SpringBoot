<!-- Contenitore principale: compone i tre figli senza logica di presentazione -->
<div class="w3-container" style="padding: 0 8px 24px; margin-top: 16px;">
  <div class="cal-wrapper">

    <!-- Header: navigazione mese, legenda, hint. Emette prevMonth/nextMonth. -->
    <app-calendar-header
      [viewDate]="viewDate()"
      (prevMonth)="prevMonth()"
      (nextMonth)="nextMonth()"
    />

    <!-- Griglia: celle giorni + drag. Emette dayClicked e dragCompleted. -->
    <app-calendar-grid
      [calendarDays]="calendarDays()"
      (dayClicked)="onDayClicked($event)"
      (dragCompleted)="onDragCompleted($event)"
    />

  </div>
</div>

<!-- Modal: renderizzati fuori dal cal-wrapper per non essere limitati dal suo layout. -->
<app-calendar-modals
  [showClosureModal]="showClosureModal()"
  [pendingStart]="pendingStart()"
  [pendingEnd]="pendingEnd()"
  [closureReason]="closureReason()"
  (closureReasonChange)="closureReason.set($event)"
  [closureError]="closureError()"
  (confirmClosure)="confirmClosure()"
  (cancelClosure)="cancelClosure()"
  [showReopenModal]="showReopenModal()"
  (confirmReopen)="confirmReopen()"
  (cancelReopen)="cancelReopen()"
  [showDeleteModal]="showDeleteModal()"
  [closureToDelete]="closureToDelete()"
  (confirmDelete)="confirmDelete()"
  (cancelDelete)="cancelDelete()"
  [showDayDetailModal]="showDayDetailModal()"
  [selectedDay]="selectedDay()"
  [dayBookings]="dayBookings()"
  (closeDayDetailModal)="closeDayDetailModal()"
  (openClosureForDay)="openClosureForDay()"
  (openDeleteForDay)="openDeleteForDay()"
/>
